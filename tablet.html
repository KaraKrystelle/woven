<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="mobile-web-app-capable" content="yes" />
    <title>Threads — Tablet</title>
    <meta name="description" content="Choose your connections — tablet controller." />
    <link rel="stylesheet" href="./style-installation.css" />
  </head>
  <body class="tablet-body">
    <header class="tablet-header">
      <h1 class="tablet-title">Threads</h1>
      <p class="tablet-subtitle">Make your choices. Projector updates live.</p>
    </header>

    <main class="tablet-main">
      <section class="tablet-section tablet-section--participant" aria-labelledby="participant-heading">
        <h2 id="participant-heading" class="tablet-section-title">Your choices</h2>
        <div id="participant-categories" class="tablet-participant-categories"></div>
      </section>

      <div class="tablet-actions">
        <button type="button" class="tablet-btn tablet-btn--secondary" id="reset">Reset</button>
        <button type="button" class="tablet-btn tablet-btn--primary" id="submit">Submit</button>
        <a href="./projector.html" target="_blank" class="tablet-btn tablet-btn--secondary" id="openProjector">Open projector</a>
      </div>
    </main>

    <script type="module" src="./js/tablet.js"></script>
  </body>
</html>
